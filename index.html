<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pause — A 12-Week Personal Reflection Journal</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #3A6EA5;
    --dark: #2B2B2B;
    --mid: #777;
    --light: #bbb;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E2E2E2;
    --diamond: #999;
    --selected: #3A6EA5;
    --selected-bg: rgba(58,110,165,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    padding: 0;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--accent);
  }

  .header h1 {
    font-family: 'EB Garamond', serif;
    font-size: 2.6rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 1.05rem;
    color: var(--mid);
    font-weight: 400;
  }

  /* NAVIGATION */
  .nav-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--mid);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-btn.completed { background: #E8F0F8; color: var(--accent); border-color: var(--accent); }
  .nav-btn.about-me { width: auto; padding: 0 14px; border-radius: 19px; font-size: 0.75rem; letter-spacing: 0.03em; }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'EB Garamond', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 16px;
  }

  /* FORM FIELDS */
  label.field-label {
    display: block;
    font-size: 0.85rem;
    color: var(--mid);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="text"], input[type="date"], textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--dark);
    background: var(--bg);
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  input[type="text"]:focus, input[type="date"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  /* GENDER RADIO */
  .gender-group {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }

  .gender-option {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--dark);
  }

  .gender-option input[type="radio"] {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s;
  }

  .gender-option input[type="radio"]:checked {
    border-color: var(--accent);
  }

  .gender-option input[type="radio"]:checked::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* SCALE ITEMS */
  .scale-item {
    margin-bottom: 28px;
  }

  .scale-item:last-child { margin-bottom: 0; }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .scale-number {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    margin-right: 4px;
  }

  .scale-label-text {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--dark);
  }

  .scale-left { text-align: left; }
  .scale-right { text-align: right; }

  /* SCALE CIRCLES */
  .scale-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }

  .scale-point {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 50%;
  }

  .scale-point:hover {
    background: var(--selected-bg);
  }

  .scale-point svg {
    transition: all 0.15s;
  }

  .scale-point.selected svg .shape {
    fill: var(--selected);
    stroke: var(--selected);
  }

  /* WEEK HEADER */
  .week-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .week-title {
    font-family: 'EB Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--accent);
  }

  .week-title span { color: var(--mid); font-size: 1rem; font-weight: 400; }

  .week-date-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }

  .week-date-row > div { flex: 1; }

  .suggested-date {
    font-size: 0.85rem;
    color: var(--mid);
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .suggested-date strong { color: var(--dark); }

  .instruction-text {
    font-size: 0.88rem;
    color: var(--mid);
    font-style: italic;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .overall-label {
    font-size: 0.92rem;
    color: var(--dark);
    font-style: italic;
    margin-bottom: 16px;
  }

  /* OPEN REFLECTION */
  .reflection-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 4px;
  }

  .reflection-hint {
    font-size: 0.82rem;
    color: var(--mid);
    font-style: italic;
    margin-bottom: 10px;
  }

  /* SAVE BUTTON */
  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 24px;
  }

  .save-btn:hover { background: #2D5A8A; }
  .save-btn:disabled { background: var(--border); cursor: default; }

  .save-confirm {
    text-align: center;
    font-size: 0.88rem;
    color: var(--accent);
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .save-confirm.visible { opacity: 1; }

  /* EXPORT */
  .export-section {
    text-align: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .export-btn {
    padding: 10px 24px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .export-btn:hover { background: var(--accent); color: #fff; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .container { padding: 24px 16px 60px; }
    .header h1 { font-size: 2rem; }
    .card { padding: 20px 18px; }
    .scale-point { width: 32px; height: 32px; }
    .week-date-row { flex-direction: column; gap: 8px; }
    .gender-group { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>THE PAUSE</h1>
    <div class="subtitle">A 12-Week Personal Reflection Journal</div>
  </div>

  <div class="nav-bar" id="navBar">
    <button class="nav-btn about-me active" onclick="showSection('about')">About Me</button>
  </div>

  <!-- ABOUT ME -->
  <div class="section active" id="section-about">
    <div class="card">
      <div class="card-title">About Me</div>
      <label class="field-label">Name</label>
      <input type="text" id="name" placeholder="">

      <label class="field-label">Gender</label>
      <div class="gender-group">
        <label class="gender-option"><input type="radio" name="gender" value="Male"> Male</label>
        <label class="gender-option"><input type="radio" name="gender" value="Female"> Female</label>
        <label class="gender-option"><input type="radio" name="gender" value="Nonbinary"> Nonbinary</label>
      </div>

      <label class="field-label">Describe yourself briefly — keep it simple, just a few sentences.</label>
      <textarea id="selfDescription" rows="4"></textarea>
    </div>
  </div>

  <!-- WEEK SECTIONS (generated by JS) -->
  <div id="weekSections"></div>

  <!-- EXPORT -->
  <div class="export-section">
    <button class="export-btn" onclick="exportData()">Export All Data (CSV)</button>
  </div>
</div>

<script>
const WEEKS = [
  { num: 1,  date: "05/01/2026" },
  { num: 2,  date: "05/09/2026" },
  { num: 3,  date: "05/16/2026" },
  { num: 4,  date: "05/23/2026" },
  { num: 5,  date: "05/31/2026" },
  { num: 6,  date: "06/07/2026" },
  { num: 7,  date: "06/14/2026" },
  { num: 8,  date: "06/21/2026" },
  { num: 9,  date: "06/29/2026" },
  { num: 10, date: "07/07/2026" },
  { num: 11, date: "07/14/2026" },
  { num: 12, date: "07/22/2026" },
];

const SCALES = [
  { num: 1, left: "Withdrawn / Reserved", right: "Engaged / Attentive" },
  { num: 2, left: "Fatigued / Depleted", right: "Vigorous / Energized" },
  { num: 3, left: "Passive / Yielding", right: "Determined / Initiating" },
  { num: 4, left: "Weighed Down / Tense", right: "At Ease / Buoyant" },
  { num: 5, left: "Self-Contained / Solitary", right: "Sociable / Connected" },
];

const MASTER = { num: 6, left: "Turned Inward / Reflective", right: "Turned Outward / Expressive" };

const data = {};

function circleSVG(isCenter) {
  if (isCenter) {
    return `<svg width="24" height="24" viewBox="0 0 24 24"><polygon class="shape" points="12,2 22,12 12,22 2,12" fill="none" stroke="#bbb" stroke-width="1.5"/></svg>`;
  }
  return `<svg width="22" height="22" viewBox="0 0 22 22"><circle class="shape" cx="11" cy="11" r="9" fill="none" stroke="#bbb" stroke-width="1.5"/></svg>`;
}

function buildScaleHTML(scale, weekNum) {
  const key = `w${weekNum}_s${scale.num}`;
  let points = '';
  for (let i = 1; i <= 7; i++) {
    const isCenter = i === 4;
    points += `<div class="scale-point" data-key="${key}" data-val="${i}" onclick="selectScale('${key}', ${i}, this)">${circleSVG(isCenter)}</div>`;
  }

  return `
    <div class="scale-item">
      <div class="scale-labels">
        <div class="scale-left"><span class="scale-number">${scale.num}.</span> <span class="scale-label-text">${scale.left}</span></div>
        <div class="scale-right"><span class="scale-label-text">${scale.right}</span></div>
      </div>
      <div class="scale-row">${points}</div>
    </div>
  `;
}

function buildWeekHTML(week) {
  let scalesHTML = SCALES.map(s => buildScaleHTML(s, week.num)).join('');
  let masterHTML = buildScaleHTML(MASTER, week.num);

  return `
    <div class="section" id="section-week${week.num}">
      <div class="week-header">
        <div class="week-title">WEEK ${week.num} <span>of 12</span></div>
      </div>
      <div class="week-date-row">
        <div>
          <div class="suggested-date">Suggested Date: <strong>${week.date}</strong></div>
        </div>
        <div>
          <label class="field-label">Date Completed</label>
          <input type="date" id="dateCompleted_${week.num}">
        </div>
      </div>
      <p class="instruction-text">Thinking about the past few days, mark the point on each scale that best reflects your overall experience.</p>

      <div class="card">
        ${scalesHTML}
      </div>

      <div class="divider"></div>
      <p class="overall-label">Overall, over the past few days I have felt more...</p>
      <div class="card">
        ${masterHTML}
      </div>

      <div class="divider"></div>
      <div class="card">
        <div class="reflection-title"><span class="scale-number">7.</span> Anything stand out about the past few days?</div>
        <div class="reflection-hint">(Events, feelings, shifts — anything or nothing. A few sentences is plenty.)</div>
        <textarea id="reflection_${week.num}" rows="4"></textarea>
      </div>

      <button class="save-btn" onclick="saveWeek(${week.num})">Save Week ${week.num}</button>
      <div class="save-confirm" id="confirm_${week.num}">Saved.</div>
    </div>
  `;
}

// Build nav buttons
const navBar = document.getElementById('navBar');
WEEKS.forEach(w => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = w.num;
  btn.onclick = () => showSection(`week${w.num}`);
  btn.id = `nav-week${w.num}`;
  navBar.appendChild(btn);
});

// Build week sections
const weekContainer = document.getElementById('weekSections');
weekContainer.innerHTML = WEEKS.map(w => buildWeekHTML(w)).join('');

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if (id === 'about') {
    document.getElementById('section-about').classList.add('active');
    document.querySelector('.nav-btn.about-me').classList.add('active');
  } else {
    document.getElementById(`section-${id}`).classList.add('active');
    document.getElementById(`nav-${id}`).classList.add('active');
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectScale(key, val, el) {
  data[key] = val;
  document.querySelectorAll(`.scale-point[data-key="${key}"]`).forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

function saveWeek(weekNum) {
  // Store reflection and date
  const reflection = document.getElementById(`reflection_${weekNum}`);
  if (reflection) data[`w${weekNum}_reflection`] = reflection.value;

  const dateEl = document.getElementById(`dateCompleted_${weekNum}`);
  if (dateEl) data[`w${weekNum}_date`] = dateEl.value;

  // Mark nav as completed
  const navBtn = document.getElementById(`nav-week${weekNum}`);
  if (navBtn && !navBtn.classList.contains('active')) navBtn.classList.add('completed');

  // Show confirmation
  const confirm = document.getElementById(`confirm_${weekNum}`);
  confirm.classList.add('visible');
  setTimeout(() => confirm.classList.remove('visible'), 2000);

  // Save to localStorage
  try {
    const aboutData = {
      name: document.getElementById('name').value,
      gender: document.querySelector('input[name="gender"]:checked')?.value || '',
      selfDescription: document.getElementById('selfDescription').value,
    };
    localStorage.setItem('thePause_about', JSON.stringify(aboutData));
    localStorage.setItem('thePause_data', JSON.stringify(data));
  } catch(e) {}
}

function exportData() {
  const name = document.getElementById('name').value;
  const gender = document.querySelector('input[name="gender"]:checked')?.value || '';
  const selfDesc = document.getElementById('selfDescription').value;

  let csv = 'Name,Gender,Self Description,Week,Suggested Date,Date Completed,Scale 1,Scale 2,Scale 3,Scale 4,Scale 5,Scale 6,Reflection\n';

  WEEKS.forEach(w => {
    const dateCompleted = document.getElementById(`dateCompleted_${w.num}`)?.value || '';
    const reflection = (document.getElementById(`reflection_${w.num}`)?.value || '').replace(/"/g, '""');
    const s1 = data[`w${w.num}_s1`] || '';
    const s2 = data[`w${w.num}_s2`] || '';
    const s3 = data[`w${w.num}_s3`] || '';
    const s4 = data[`w${w.num}_s4`] || '';
    const s5 = data[`w${w.num}_s5`] || '';
    const s6 = data[`w${w.num}_s6`] || '';

    csv += `"${name}","${gender}","${selfDesc.replace(/"/g, '""')}",${w.num},"${w.date}","${dateCompleted}",${s1},${s2},${s3},${s4},${s5},${s6},"${reflection}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `The_Pause_${name || 'data'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Load saved data on page load
try {
  const savedAbout = JSON.parse(localStorage.getItem('thePause_about') || '{}');
  if (savedAbout.name) document.getElementById('name').value = savedAbout.name;
  if (savedAbout.selfDescription) document.getElementById('selfDescription').value = savedAbout.selfDescription;
  if (savedAbout.gender) {
    document.querySelector(`input[name="gender"][value="${savedAbout.gender}"]`).checked = true;
  }

  const savedData = JSON.parse(localStorage.getItem('thePause_data') || '{}');
  Object.assign(data, savedData);

  // Restore scale selections and reflections
  Object.entries(savedData).forEach(([key, val]) => {
    if (key.includes('_s') && !key.includes('reflection') && !key.includes('date')) {
      const el = document.querySelector(`.scale-point[data-key="${key}"][data-val="${val}"]`);
      if (el) el.classList.add('selected');
    }
    if (key.includes('reflection')) {
      const weekNum = key.split('_')[0].replace('w', '');
      const textarea = document.getElementById(`reflection_${weekNum}`);
      if (textarea) textarea.value = val;
    }
    if (key.includes('date')) {
      const weekNum = key.split('_')[0].replace('w', '');
      const dateEl = document.getElementById(`dateCompleted_${weekNum}`);
      if (dateEl) dateEl.value = val;
    }
  });
} catch(e) {}
</script>

</body>
</html>
